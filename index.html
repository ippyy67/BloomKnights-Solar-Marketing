<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SunView Florida</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="splash">
    <div class="splash-inner">
      <div class="sun" aria-hidden="true">
        <div class="sun-rays">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
        </div>
        <div class="sun-core"></div>
      </div>
      <h1 class="splash-title">SunView <span>Florida</span></h1>
      <p class="splash-tag">Find the neighborhoods solar hasn't reached yet.</p>
      <button id="enter-app" type="button">Explore the map</button>
    </div>
  </div>

  <header id="app-header">
    <div class="brand">
      <span class="brand-mark">☀</span>
      <span class="brand-name">SunView</span>
      <span class="brand-sub">Florida</span>
    </div>
    <nav id="breadcrumb">
      <button class="crumb active">USA</button>
    </nav>
  </header>

  <main id="map"></main>

  <div id="level-loader" aria-hidden="true">
    <div class="loader-sun">
      <div class="loader-rays">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="loader-core"></div>
    </div>
  </div>

  <aside id="legend">
    <h3 id="legend-title">Renewable Coverage</h3>
    <div class="legend-bar"></div>
    <div class="legend-labels">
      <span>No coverage</span>
      <span>Full coverage</span>
    </div>
    <p id="legend-hint">Share of households on renewable energy, by state. Click a state to drill in.</p>
  </aside>

  <div id="info-panel" class="hidden">
    <button id="info-close">&times;</button>
    <div id="info-content"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/geo-data.js"></script>
  <script src="js/data.js"></script>
  <script src="js/secrets.js" onerror="void 0"></script>
  <script src="js/config.js"></script>
  <script src="js/gemini-simple.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
